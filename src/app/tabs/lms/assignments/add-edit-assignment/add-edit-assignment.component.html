<div class="form-back-bar">
  <button type="button" class="form-back-btn" (click)="onCancel()" title="Back to list">
    <fa-icon [icon]="faArrowLeft"></fa-icon>
  </button>
  <div>
    <h2 class="page-title">{{ isEdit ? 'Edit Assignment' : 'Add New Assignment' }}</h2>
    <p class="page-subtitle">
      {{ isEdit ? 'Update assignment details below.' : 'Create a new assignment for the selected class & subject.' }}
    </p>
  </div>
</div>

<form class="page-card" (ngSubmit)="onSave()" novalidate>
  <div class="form-card-header">
    <div>
      <h3 class="form-card-title">Assignment Details</h3>
      <p class="form-card-subtitle">Provide title, subject and submission date.</p>
    </div>
    <span class="form-card-meta">Fields marked with <sup style="color:#e74c3c">*</sup> are required.</span>
  </div>

  <div class="form-card-body">
    <div class="row g-3">
      <div class="col-12 col-md-8">
        <div class="form-field">
          <label>Title<sup>*</sup></label>
          <input type="text" class="input-secondary" [(ngModel)]="model.title" name="title" placeholder="e.g. Tense Worksheet" />
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="form-field">
          <label>Total Marks</label>
          <input type="number" class="input-secondary" [(ngModel)]="model.totalMarks" name="totalMarks" min="0" />
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="form-field">
          <label>Subject<sup>*</sup></label>
          <select class="select-primary" [(ngModel)]="model.subject" name="subject">
            <option value="">Select Subject</option>
            @for (s of subjectOptions; track s) {
              <option [value]="s">{{ s }}</option>
            }
          </select>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="form-field">
          <label>Class<sup>*</sup></label>
          <select class="select-primary" [(ngModel)]="model.className" name="className">
            <option value="">Select Class</option>
            @for (c of classOptions; track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="form-field">
          <label>Section</label>
          <select class="select-primary" [(ngModel)]="model.section" name="section">
            <option value="">Select Section</option>
            @for (s of sectionOptions; track s) {
              <option [value]="s">{{ s }}</option>
            }
          </select>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Assigned On<sup>*</sup></label>
          <input type="date" class="input-secondary" [(ngModel)]="model.assignedOn" name="assignedOn" />
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Due On<sup>*</sup></label>
          <input type="date" class="input-secondary" [(ngModel)]="model.dueOn" name="dueOn" />
        </div>
      </div>

      <div class="col-12">
        <div class="form-field">
          <label>Description / Instructions</label>
          <textarea rows="4" class="input-secondary" [(ngModel)]="model.description" name="description" placeholder="Write assignment instructions..."></textarea>
        </div>
      </div>

      <div class="col-12">
        <div class="form-field">
          <label>Attachment</label>
          <div class="upload-row">
            <input type="file" class="input-secondary" />
            <span class="hint"><fa-icon [icon]="faPaperclip"></fa-icon> PDF, DOC, PNG, JPG accepted</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn-pill-ghost" (click)="onCancel()">Cancel</button>
    <button type="submit" class="btn-pill-primary">
      {{ isEdit ? 'Update Assignment' : 'Save Assignment' }}
    </button>
  </div>
</form>
