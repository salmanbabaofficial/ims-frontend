<div class="form-back-bar">
  <button type="button" class="form-back-btn" (click)="onCancel()" title="Back to list">
    <fa-icon [icon]="faArrowLeft"></fa-icon>
  </button>
  <div>
    <h2 class="page-title">{{ isEdit ? 'Edit Section' : 'Add New Section' }}</h2>
    <p class="page-subtitle">
      {{ isEdit ? 'Update section details below.' : 'Fill in the details to create a new section.' }}
    </p>
  </div>
</div>

<form class="page-card" (ngSubmit)="onSave()" #sectionForm="ngForm" novalidate>
  <div class="form-card-header">
    <div>
      <h3 class="form-card-title">Section Information</h3>
      <p class="form-card-subtitle">Section details and class assignment.</p>
    </div>
    <span class="form-card-meta">Fields marked with <sup style="color:#e74c3c">*</sup> are required.</span>
  </div>

  <div class="form-card-body">
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Class<sup>*</sup></label>
          <select class="select-primary" [(ngModel)]="model.className" name="className">
            <option value="" disabled>Select class</option>
            @for (c of classOptions(); track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Section Name<sup>*</sup></label>
          <input
            type="text"
            class="input-secondary"
            [(ngModel)]="model.name"
            name="name"
            placeholder="e.g. A"
          />
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Capacity</label>
          <input
            type="number"
            class="input-secondary"
            [(ngModel)]="model.capacity"
            name="capacity"
            placeholder="e.g. 35"
          />
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Room Number</label>
          <input type="text" class="input-secondary" [(ngModel)]="model.roomNumber" name="roomNumber" placeholder="e.g. R-12" />
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Class Teacher</label>
          <select class="select-primary" [(ngModel)]="model.classTeacher" name="classTeacher">
            <option value="">— Select teacher —</option>
            @for (t of teacherOptions(); track t) {
              <option [value]="t">{{ t }}</option>
            }
          </select>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="form-field">
          <label>Status</label>
          <select class="select-primary" [(ngModel)]="model.status" name="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="col-12">
        <div class="form-field">
          <label>Description</label>
          <textarea rows="2" class="input-secondary" [(ngModel)]="model.description" name="description" placeholder="Optional..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn-pill-ghost" (click)="onCancel()">Cancel</button>
    <button type="submit" class="btn-pill-primary">
      {{ isEdit ? 'Update Section' : 'Save Section' }}
    </button>
  </div>
</form>
